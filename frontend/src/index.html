<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title> Nakuri </title>
        <style>
            body{
                background: yellow;
            }
            header{
                display: flex;
                justify-content: space-between;
                padding: 15px 50px;
                background: lightblue;
            }
            .logo{
                color: #2280ec;
                font-weight: bold;
                font-size: 29px;
                font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif
            }
            nav a{
                margin: 0 15px;
                color: black;
            }
            .login-btn{
                background: white;
                padding: 8px 15px;
                cursor: pointer;
                border-radius: 6px;
                border: 1px solid #4a90e2
            }
            .register-btn{
                background: #eca202;
                padding: 8ps 15px;
                border-radius: 5px;
                color: rgb(216, 152, 15);
                cursor: pointer;
            }
            .hero{
                text-align: center;
                padding: 60px 20px;
                font-style: bold;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            }
            .hero h1{
                font-size: 32;
            }
            .search-box{
                margin-top: 30px;
            }
            .search-box input{
                padding: 12px;
                width: 200px;
                margin: 5px;
                border-radius: 5px;
                border: 1px solid #ccc;
            }
            .search-btn{
                 padding: 12px 20px;
                 color: white;
                 background: #4a90e2;
                 border-radius: 5px;
                 cursor: pointer;
            }
            .cards{
                display: flex;
                justify-content: center;
                gap: 20px;
                margin: 50px;
            }
            .card{
                background: white;
                padding: 20px;
                width: 200px;
                height: 190px;
                border-radius: 10px;
                text-align: center;
            }

            </style>

            </head>

            <body>

                <header>
                    <div class="logo"> Naukri </div>

                <nav>
                    <a href="#"> Jobs </a>
                    <a href="#"> Companies </a>
                    <a href="#"> Services </a>
                </nav>

                <div>
                    <button class="login-btn"> Login </button>
                    <button class="resister-btn"> Register </button>
                </div>
                </header>

                <section class="hero">
                    <h1> Find your dream job </h1>
                    
                    <div class="search-box">
                        <input type="text" placeholder="Skills / Designations">
                        <input type="text" placeholder="Location">
                        <input type="text" placeholder="Experience">
                        <button class="search-btn"> Search </button>
                    </div>
                </section>

                <section class="cards">
                    <div class="card">
                        <h3> Top Companies </h3>
                        <p> Explore jobs from top companies </p>
                    </div>

                    <div class="card">
                        <h3> Remote Jobs </h3>
                        <p> Work from home opportunities </p>
                    </div>

                    <div class="card">
                        <h3> Fresher Jobs </h3>
                        <p> Job for freshers </p>
                    </div>
                </section>
            </body>
                </html>
